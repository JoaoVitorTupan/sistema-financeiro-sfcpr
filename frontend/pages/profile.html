<!DOCTYPE html>
<html>
  <head>
    <title>Perfil do Usuário</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>

  <body class="container mt-5">

    <div class="container-top">
      <a href="financeiro.html" class="btn-voltar">
        <img src="../assets/back.png" alt="Voltar">
      </a>
    </div>

    <h1>Meu Perfil</h1>
    <hr>

    <div class="card p-4 shadow-sm">
      
      <div class="mb-3">
        <strong>Nível de Acesso:</strong>
        <p id="roleUsuario" class="mb-0"></p>
      </div>

      <div class="mb-3">
        <strong>Nome:</strong>
        <p id="nomeUsuario" class="mb-0"></p>
      </div>

      <div class="mb-3">
        <strong>Email:</strong>
        <p id="emailUsuario" class="mb-0"></p>
      </div>

      <div class="mb-3">
        <strong>Senha:</strong>
        <p>
          <a href="forgot-password.html">Alterar senha</a>
        </p>
      </div>

    </div>

    <div class="mt-4 text-center">
      <a href="#" id="logoutLink" class="text-primary fw-bold">Sair</a>
    </div>

    <script src="../js/profile.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
