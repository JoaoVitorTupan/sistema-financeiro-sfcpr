<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Usuários</title>

  <link rel="stylesheet" href="../css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="dashboard">

  <div class="top-bar">

    <h1>Gerenciamento de Usuários</h1>

    <div class="top-actions">
      <img src="../assets/menu.png" alt="Menu" id="btnMenu" class="menu-Icone">

      <img src="../assets/perfil.png" alt="Perfil" id="btnPerfil" class="Usuario-Icone">

      <div id="menuDropdown" class="menu-dropdown">
        <a href="gerenciarUsuarios.html">Gerenciar Usuários</a>
        <a href="clienteOuFornecedor.html">Clientes e Fornecedores</a>
        <a href="perfil.html">Perfil</a>
        <a href="login.html">Sair</a>
      </div>
    </div>

  </div>

  <hr>
  <div class="d-flex align-items-center">
    <a href="financeiro.html" class="btn-voltar">
      <img src="../assets/voltar.png" alt="Voltar">
    </a>
  </div>

  <div class="container mt-4">

    <div class="d-flex align-items-center mb-3">
      <input type="text" id="busca" class="form-control me-2" placeholder="Buscar usuário...">
      <button class="btn btn-primary me-2" onclick="buscarUsuarios()">Buscar</button>
      <button class="btn btn-success" id="btnAdicionar">Cadastrar</button>  
    </div>

    <div class="dvTabela">
      <table class="table table-bordered">
        <thead class="table-light">
          <tr>
            <th>Nome</th>
            <th>Email</th>
            <th>Perfil</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="usuariosTable">
        </tbody>
      </table>
    </div>
  </div>

  <div id="modal" class="modal" style="display:none;">
    <div class="modal-box">

      <h2>Cadastrar Usuário</h2>

      <input type="text" id="nome" class="form-control mb-2" placeholder="Nome">
      <input type="email" id="email" class="form-control mb-2" placeholder="Email">

      <input type="password" id="senha" class="form-control mb-2" placeholder="Senha">
      <input type="password" id="confirmSenha" class="form-control mb-2" placeholder="Confirmar senha">

      <select id="role" class="form-control mb-2">
        <option value="administrador">Administrador</option>
        <option value="gestor">Gestor</option>
        <option value="financeiro">Financeiro</option>
      </select>

      <p id="error" class="text-danger"></p>

      <div class="d-flex justify-content-between mt-3">
        <button class="btn btn-primary" id="btnSalvar">Salvar</button>
        <button class="btn btn-secondary" id="btnCancelar">Cancelar</button>
      </div>

    </div>
    </div>

    <div id="modalEditar" class="modal" style="display:none;">
    <div class="modal-box">

      <h2>Editar Usuário</h2>

      <input type="hidden" id="editarId">

      <input type="text" id="editarNome" class="form-control mb-2" placeholder="Nome">
      <input type="email" id="editarEmail" class="form-control mb-2" placeholder="Email">

      <select id="editarRole" class="form-control mb-2">
        <option value="administrador">Administrador</option>
        <option value="gestor">Gestor</option>
        <option value="financeiro">Financeiro</option>
      </select>

      <select id="editarStatus" class="form-control mb-2">
        <option value="true">Ativo</option>
        <option value="false">Inativo</option>
      </select>

      <div class="d-flex justify-content-between mt-3">
        <button class="btn btn-primary" onclick="atualizarUsuario()">Salvar</button>
        <button class="btn btn-secondary" onclick="fecharEditar()">Cancelar</button>
      </div>

    </div>
  </div>

  <script src="../js/gerenciarUsuarios.js"></script>

</body>
</html>
