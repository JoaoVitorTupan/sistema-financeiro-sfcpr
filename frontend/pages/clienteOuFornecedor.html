<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Clientes e Fornecedores</title>

  <link rel="stylesheet" href="../css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="dashboard">

  <div class="top-bar">
    <h1>Clientes e Fornecedores</h1>

    <div class="top-actions">
        <img src="../assets/menu.png" alt="Menu" id="btnMenu" class="menu-Icone">
        <img src="../assets/perfil.png" alt="Perfil" id="btnPerfil" class="Usuario-Icone">
        <div id="menuDropdown" class="menu-dropdown">
          <a href="gerenciarUsuarios.html">Gerenciar Usuários</a>
          <a href="clienteOuFornecedor.html">Clientes e Fornecedores</a>
          <a href="perfil.html">Perfil</a>
          <a href="login.html" id="sair">Sair</a>
        </div>
    </div>
  </div>

  <hr>

  <div class="dvCaixas">

    <div>
      <b>Total de Registros</b><br>
      <span id="totalClienteOuFornecedor">0</span>
    </div>

    <div>
      <b>Clientes</b><br>
      <span id="totalClientes">0</span>
    </div>

    <div>
      <b>Fornecedores</b><br>
      <span id="totalFornecedores">0</span>
    </div>

  </div>

  <div class="dvBusca">
    <input
      type="text"
      id="buscar"
      class="form-control"
      placeholder="Digite o nome ou CPF/CNPJ..."
    >

    <button class="btn btn-primary" id="btnBuscar">
      Buscar
    </button>

    <button class="btn btn-success" id="btnAdicionar">
      Adicionar
    </button>
  </div>

  <div class="dvTabela">
    <table class="table table-bordered">

      <thead class="table-light">
        <tr>
          <th>Tipo</th>
          <th>Nome</th>
          <th>CPF/CNPJ</th>
          <th>Email</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody id="tabelaClienteOuFornecedor"></tbody>

    </table>
  </div>

  <div id="modal" class="modal">
    <div class="modal-box">

      <h2 id="modalTitulo">
        Novo Cliente ou Fornecedor
      </h2>

      <select id="tipo" class="form-control mb-2">
        <option value="cliente">Cliente</option>
        <option value="fornecedor">Fornecedor</option>
      </select>

      <input
        type="text"
        id="nome"
        class="form-control mb-2"
        placeholder="Nome"
      >

      <input
        type="text"
        id="cpf_cnpj"
        class="form-control mb-2"
        placeholder="CPF/CNPJ"
      >

      <input
        type="text"
        id="email"
        class="form-control mb-2"
        placeholder="Email"
      >

      <input
        type="text"
        id="telefone"
        class="form-control mb-2"
        placeholder="Telefone"
      >

      <input
        type="text"
        id="endereco"
        class="form-control mb-2"
        placeholder="Endereço"
      >

      <div class="d-flex justify-content-between mt-3">
        <button class="btn btn-primary" id="btnSalvar">
          Salvar
        </button>

        <button class="btn btn-secondary" id="btnCancelar">
          Cancelar
        </button>
      </div>

    </div>
  </div>

  <script src="../js/clienteOuFornecedor.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
