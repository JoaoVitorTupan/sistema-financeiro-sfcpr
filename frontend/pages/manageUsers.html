<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Usuários</title>

  <link rel="stylesheet" href="../css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="dashboard">

  <div class="top-bar d-flex align-items-center justify-content-between p-3">
    <h2 class="mb-0">Gerenciamento de Usuários</h2>

  </div>
    <div class="d-flex align-items-center">
      <a href="financeiro.html" class="btn-voltar">
        <img src="../assets/back.png" alt="Voltar">
      </a>
    </div>

  <div class="container mt-4">

    <div class="d-flex align-items-center mb-3">
      <input type="text" id="search" class="form-control me-2" placeholder="Buscar usuário...">
      <button class="btn btn-primary me-2" onclick="searchUser()">Buscar</button>
      <button class="btn btn-success" id="btnAdicionar">Cadastrar</button>  
    </div>

    <div class="dvTabela">
      <table class="table table-bordered">
        <thead class="table-light">
          <tr>
            <th>Nome</th>
            <th>Email</th>
            <th>Perfil</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="userTable">
        </tbody>
      </table>
    </div>
  </div>

  <div id="modal" class="modal" style="display:none;">
    <div class="modal-box">

      <h2>Cadastrar Usuário</h2>

      <input type="text" id="name" class="form-control mb-2" placeholder="Nome">
      <input type="email" id="email" class="form-control mb-2" placeholder="Email">

      <input type="password" id="password" class="form-control mb-2" placeholder="Senha">
      <input type="password" id="confirmPassword" class="form-control mb-2" placeholder="Confirmar senha">

      <select id="role" class="form-control mb-2">
        <option value="administrador">Administrador</option>
        <option value="gestor">Gestor</option>
        <option value="financeiro">Financeiro</option>
      </select>

      <p id="error" class="text-danger"></p>

      <div class="d-flex justify-content-between mt-3">
        <button class="btn btn-primary" id="btnSalvar">Salvar</button>
        <button class="btn btn-secondary" id="btnCancelar">Cancelar</button>
      </div>

    </div>
    </div>

    <div id="modalEdit" class="modal" style="display:none;">
    <div class="modal-box">

      <h2>Editar Usuário</h2>

      <input type="hidden" id="editId">

      <input type="text" id="editName" class="form-control mb-2" placeholder="Nome">
      <input type="email" id="editEmail" class="form-control mb-2" placeholder="Email">

      <select id="editRole" class="form-control mb-2">
        <option value="administrador">Administrador</option>
        <option value="gestor">Gestor</option>
        <option value="financeiro">Financeiro</option>
      </select>

      <div class="d-flex justify-content-between mt-3">
        <button class="btn btn-primary" onclick="updateUser()">Salvar</button>
        <button class="btn btn-secondary" onclick="closeEdit()">Cancelar</button>
      </div>

    </div>
  </div>

  <script src="../js/manageUsers.js"></script>

</body>
</html>
